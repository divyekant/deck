services:
  deck:
    build: .
    container_name: deck
    ports:
      - "3001:3001"
    volumes:
      - ~/.claude:/home/node/.claude:ro
      - ~/.codex:/home/node/.codex:ro
      - ~/.deck:/home/node/.deck
      - ~/Projects:/Users/divyekant/Projects:ro
    environment:
      - HOME=/home/node
    restart: unless-stopped
